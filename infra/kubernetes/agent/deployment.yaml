apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeguardian-agent
  namespace: ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeguardian-agent
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeguardian-agent
subjects:
- kind: ServiceAccount
  name: kubeguardian-agent
  namespace: ops
roleRef:
  kind: ClusterRole
  name: kubeguardian-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeguardian-agent
  namespace: ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeguardian-agent
  template:
    metadata:
      labels:
        app: kubeguardian-agent
    spec:
      serviceAccountName: kubeguardian-agent
      containers:
      - name: agent
        image: 120430500058.dkr.ecr.us-east-1.amazonaws.com/kubeguardian-agent:latest
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kubeguardian-agent
  namespace: ops
spec:
  selector:
    app: kubeguardian-agent
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
